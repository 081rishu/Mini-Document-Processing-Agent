<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini Document-Processing Agent</title>
  <style>
    :root { color-scheme: light dark; --bg:#0f1115; --card:#1a1d24; --fg:#e6e6e6;
      --muted:#9aa0aa; --accent:#5b9dff; --ok:#3fb950; --warn:#d29922; --err:#f85149;
      --border:#2a2e37; }
    * { box-sizing: border-box; }
    body { font-family: -apple-system, Segoe UI, Roboto, sans-serif; margin:0;
      background:var(--bg); color:var(--fg); line-height:1.5; }
    header { padding:28px 20px; border-bottom:1px solid var(--border); }
    h1 { margin:0 0 6px; font-size:1.4rem; }
    header p { margin:0; color:var(--muted); font-size:.9rem; }
    main { max-width:960px; margin:0 auto; padding:24px 20px 60px; }
    .drop { border:2px dashed var(--border); border-radius:12px; padding:32px;
      text-align:center; transition:.15s; background:var(--card); }
    .drop.drag { border-color:var(--accent); }
    .btn { background:var(--accent); color:#fff; border:0; border-radius:8px;
      padding:10px 18px; font-size:.95rem; cursor:pointer; margin-top:14px; }
    .btn:disabled { opacity:.5; cursor:default; }
    #filelist { color:var(--muted); font-size:.85rem; margin-top:12px; }
    .summary { display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
      gap:12px; margin:24px 0; }
    .stat { background:var(--card); border:1px solid var(--border); border-radius:10px;
      padding:14px; }
    .stat .n { font-size:1.6rem; font-weight:600; }
    .stat .l { color:var(--muted); font-size:.75rem; text-transform:uppercase;
      letter-spacing:.04em; }
    .doc { background:var(--card); border:1px solid var(--border); border-radius:10px;
      padding:16px; margin-bottom:14px; }
    .doc-head { display:flex; justify-content:space-between; align-items:center;
      flex-wrap:wrap; gap:8px; }
    .tag { font-size:.72rem; padding:2px 8px; border-radius:20px; border:1px solid var(--border); }
    .tag.type { background:#1f2a44; color:var(--accent); }
    .tag.ok { color:var(--ok); border-color:var(--ok); }
    .tag.err { color:var(--err); border-color:var(--err); }
    .conf { height:6px; background:var(--border); border-radius:4px; overflow:hidden; margin:10px 0; }
    .conf > span { display:block; height:100%; background:var(--ok); }
    .conf.low > span { background:var(--warn); }
    .flags { margin:8px 0 0; padding:0; list-style:none; }
    .flags li { font-size:.82rem; color:var(--warn); padding:3px 0; }
    .flags li.field { color:var(--muted); }
    details { margin-top:10px; }
    summary { cursor:pointer; color:var(--accent); font-size:.85rem; }
    pre { background:#0b0d11; border:1px solid var(--border); border-radius:8px;
      padding:12px; overflow-x:auto; font-size:.8rem; }
    .err-box { color:var(--err); font-size:.85rem; }
    .spinner { display:inline-block; width:16px; height:16px; border:2px solid #fff6;
      border-top-color:#fff; border-radius:50%; animation:spin .7s linear infinite;
      vertical-align:-3px; margin-right:6px; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>
  <header>
    <h1>Mini Document-Processing Agent</h1>
    <p>Classify → route → extract structured JSON → verify. Low-confidence fields are flagged for review.</p>
  </header>
  <main>
    <form id="form">
      <div class="drop" id="drop">
        <div>Drop documents here or click to choose</div>
        <div style="color:var(--muted);font-size:.8rem;margin-top:6px">
          PDF, images, DOCX, TXT — resumes, invoices/utility bills, agreements
        </div>
        <input id="input" type="file" multiple hidden
               accept=".pdf,.png,.jpg,.jpeg,.webp,.docx,.txt,.md,.csv" />
        <div id="filelist"></div>
        <button class="btn" id="submit" type="submit" disabled>Process batch</button>
      </div>
    </form>
    <div id="results"></div>
  </main>

  <script>
    const input = document.getElementById('input');
    const drop = document.getElementById('drop');
    const filelist = document.getElementById('filelist');
    const submit = document.getElementById('submit');
    const results = document.getElementById('results');
    let files = [];

    drop.addEventListener('click', e => { if (e.target.tagName !== 'BUTTON') input.click(); });
    input.addEventListener('change', () => setFiles([...input.files]));
    ['dragover','dragenter'].forEach(ev => drop.addEventListener(ev, e => {
      e.preventDefault(); drop.classList.add('drag'); }));
    ['dragleave','drop'].forEach(ev => drop.addEventListener(ev, e => {
      e.preventDefault(); drop.classList.remove('drag'); }));
    drop.addEventListener('drop', e => setFiles([...e.dataTransfer.files]));

    function setFiles(f) {
      files = f;
      filelist.textContent = f.length ? f.map(x => x.name).join(', ') : '';
      submit.disabled = f.length === 0;
    }

    document.getElementById('form').addEventListener('submit', async e => {
      e.preventDefault();
      if (!files.length) return;
      submit.disabled = true;
      submit.innerHTML = '<span class="spinner"></span>Processing…';
      results.innerHTML = '';
      const fd = new FormData();
      files.forEach(f => fd.append('files', f));
      try {
        const res = await fetch('/process', { method: 'POST', body: fd });
        const body = await res.json();
        if (!res.ok) throw new Error(body.detail || res.statusText);
        render(body);
      } catch (err) {
        results.innerHTML = `<div class="doc err-box">Error: ${err.message}</div>`;
      } finally {
        submit.disabled = false;
        submit.textContent = 'Process batch';
      }
    });

    function esc(s) { return String(s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

    function render(r) {
      const s = r.summary;
      const stats = [
        ['Total', s.total], ['Succeeded', s.succeeded], ['Failed', s.failed],
        ['Flag rate', (s.flag_rate*100).toFixed(0)+'%'],
        ['Cost', '$'+ (s.total_cost_usd||0).toFixed(4)],
        ['Time', (s.duration_ms/1000).toFixed(1)+'s'],
      ];
      let html = `<div class="summary">` + stats.map(([l,n]) =>
        `<div class="stat"><div class="n">${n}</div><div class="l">${l}</div></div>`).join('') + `</div>`;

      for (const d of r.documents) {
        const failed = d.status === 'FAILED';
        const conf = d.type_confidence ?? 0;
        const low = conf < 0.6;
        html += `<div class="doc"><div class="doc-head">
          <strong>${esc(d.filename)}</strong>
          <span>${d.type ? `<span class="tag type">${d.type}</span> ` : ''}
          <span class="tag ${failed?'err':'ok'}">${d.status}</span></span></div>`;
        if (failed) {
          html += `<div class="err-box">Failed at ${esc(d.failed_stage)}: ${esc(d.error)}</div>`;
        } else {
          html += `<div class="conf ${low?'low':''}"><span style="width:${(conf*100).toFixed(0)}%"></span></div>
            <div style="color:var(--muted);font-size:.78rem">confidence ${(conf*100).toFixed(0)}%</div>`;
          if (d.flagged_fields?.length) {
            html += `<ul class="flags">` + d.flagged_fields.map(f =>
              `<li class="${f.level}">⚑ ${f.level==='document'?'Document':esc(f.field)}: ${esc(f.reason)}`
              + (f.failed_signals?.length ? ` (${f.failed_signals.join(', ')})` : '')
              + (f.confidence!=null ? ` · ${(f.confidence*100).toFixed(0)}%` : '') + `</li>`).join('') + `</ul>`;
          }
          html += `<details><summary>Extracted JSON</summary><pre>${esc(JSON.stringify(d.data, null, 2))}</pre></details>`;
        }
        html += `</div>`;
      }
      results.innerHTML = html;
    }
  </script>
</body>
</html>
